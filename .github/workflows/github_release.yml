env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Create GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch pyaes pysocks

      - name: Build package
        run: hatch build

      - name: Get version
        run: echo "LIB_VERSION=v$(hatch version)" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LIB_VERSION }}
          name: ${{ env.LIB_VERSION }}
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: false
          files: dist/*
