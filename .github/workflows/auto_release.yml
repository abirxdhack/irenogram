env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Auto Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - "pyrogram/__init__.py"

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch pyaes pysocks

      - name: Get current version from __init__.py
        id: get_version
        run: |
          VERSION=$(python -c "import re; content=open('pyrogram/__init__.py').read(); print(re.search(r'__version__\s*=\s*[\"\']([\d.]+)[\"\']\s*', content).group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Bump patch version if tag already exists
        if: env.TAG_EXISTS == 'true'
        run: |
          CURRENT="${{ env.VERSION }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW_VERSION\"/" pyrogram/__init__.py
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "TAG=v$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit bumped version if needed
        if: env.TAG_EXISTS == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyrogram/__init__.py
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git push

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: Build package
        run: hatch build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: false
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false
