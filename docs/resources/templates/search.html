{% extends "furo/search.html" %}

{% block extrahead %}
    {{ super() }}
    <meta name="description" content="Search the Irenogram documentation — methods, types, enums, handlers, filters and raw API." />
    <meta name="robots" content="noindex,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Search — Irenogram Docs" />
    <meta property="og:description" content="Rich, fast search across the Irenogram Python library documentation." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Search — Irenogram Docs" />
    <meta name="twitter:description" content="Rich, fast search across the Irenogram Python library documentation." />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
{% endblock %}

{% block scripts %}
    {{ super() }}
    <script>
        (function () {
            "use strict";
            function getQ() {
                var src = (window.location.hash || "").replace(/^#\??/, "") ||
                          (window.location.search || "").replace(/^\?/, "");
                return (new URLSearchParams(src).get("q") || "").trim();
            }
            function tryRun() {
                var q = getQ();
                if (!q) return false;
                if (window.Search && typeof window.Search.performSearch === "function") {
                    try { if (typeof window.Search.init === "function") window.Search.init(); } catch (e) {}
                    try { window.Search.performSearch(q); return true; } catch (e) {}
                }
                return false;
            }
            var attempts = 0;
            var iv = setInterval(function () {
                attempts++;
                if (tryRun() || attempts > 120) clearInterval(iv);
            }, 100);
            window.addEventListener("hashchange", function () {
                attempts = 0;
                var iv2 = setInterval(function () {
                    attempts++;
                    if (tryRun() || attempts > 120) clearInterval(iv2);
                }, 100);
            });
        })();
    </script>
{% endblock %}
