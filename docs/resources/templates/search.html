{% extends "furo/search.html" %}

{%- block htmltitle -%}
<title>Search — {{ docstitle }}</title>
{%- endblock htmltitle -%}

{%- block extrahead -%}
{{ super() }}
<link rel="canonical" href="https://abirxdhack.github.io/irenogram/search/">
<meta name="description" content="Search the Irenogram documentation for methods, types, enums, filters, handlers, raw API objects and guides.">
<meta property="og:title" content="Search — Irenogram Documentation">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ pathto('_static/open-graph.png', 1) }}">
<meta property="og:url" content="https://abirxdhack.github.io/irenogram/search/">
<meta property="og:description" content="Search the Irenogram documentation.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
{%- endblock extrahead -%}

{%- block content -%}
<article role="main" id="furo-main-content">
    <noscript>
        <div class="admonition error">
            <p class="admonition-title">JavaScript required</p>
            <p>Please enable JavaScript to use the documentation search.</p>
        </div>
    </noscript>
    <div id="search-results"></div>
</article>
{%- endblock content -%}

{% block scripts %}
{{ super() }}
<script>
(function () {
    "use strict";

    function readQuery() {
        try {
            var params = new URLSearchParams(window.location.search || window.location.hash.replace(/^#\??/, "?"));
            return params.get("q") || "";
        } catch (error) {
            return "";
        }
    }

    function tryRun() {
        if (typeof Search === "undefined") {
            return false;
        }

        var query = readQuery();

        try {
            if (typeof Search.init === "function") {
                Search.init();
            }

            if (query && typeof Search.performSearch === "function") {
                Search.performSearch(query);
            }

            return true;
        } catch (error) {
            window.__irenogramTemplateSearchError = error;
            return false;
        }
    }

    var attempts = 0;
    var timer = setInterval(function () {
        attempts += 1;

        if (tryRun() || attempts > 100) {
            clearInterval(timer);
        }
    }, 120);
})();
</script>
{% endblock %}
